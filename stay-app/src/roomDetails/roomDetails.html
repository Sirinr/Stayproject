
<!doctype html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../styles.css" />
    <link rel="stylesheet" href="roomDetails.css" />
    <title>Room Details</title>
  </head>
  <body>
    <main>
      <section>
        <form action="#">
          <div class="search-form">
            <div class="filter-destination">
              <label for="filter-destination">📍Hvor vil du reise?</label>
              <input type="text" />
            </div>
            <div class="filter-date">
              <label for="filter-date">📆 Når vil du reise?</label>
              <input type="date" />
            </div>
            <div class="filter-guest">
              <label for="filter-guest">🧑‍🧑‍🧒‍🧒 Antall gjester</label>
              <input type="number" />
            </div>
            <div>
              <button>Search</button>
            </div>
          </div>
        </form>
        <button>Back to rooms</button>
      </section>
      <section class="container-pic">
        <div class="main-pic">
          <img
            src="https://images.unsplash.com/photo-1698933787134-af2d451985c7?q=80&w=1740&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
            alt="" />
        </div>
        <div class="container-pics">
          <div class="card-pics">
            <img
              src="https://images.unsplash.com/photo-1542718610-a1d656d1884c?q=80&w=1740&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
              alt="" />
          </div>
          <div class="card-pics">
            <img
              src="https://images.unsplash.com/photo-1722650273450-1e3681f53c83?q=80&w=1740&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
              alt="" />
          </div>
          <div class="card-pics">
            <img
              src="https://images.unsplash.com/photo-1607582544644-f1da2a004994?q=80&w=1742&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
              alt="" />
          </div>
          <div class="card-pics">
            <img
              src="https://images.unsplash.com/photo-1721824295828-39e669aabb18?q=80&w=1740&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
              alt="" />
          </div>
        </div>
      </section>

      <section class="details">
        <article>
          <h1>Overskrift på rommet</h1>
          <ul class="ameneties-list">
            <li>Her</li>
            <li>Kommer</li>
            <li>Det</li>
            <li>Mange</li>
            <li>Ting</li>
            <li>Etterhvert</li>
            <li>Fordelt</li>
            <li>På</li>
            <li>Opptil</li>
            <li>Tre</li>
            <li>Kolonner</li>
          </ul>
          
            <form action="#" class="review-form">
              <label for="review">Skriv en anmeldelse</label>
              <input type="text" name="review" id="review"></input>
            </form>
        
        </article>
        <form action="#">
          <div class="booking-form">
            <div>
            <label for="check-in">Check-in</label>
            <input type="date" class="check-in" name="check-in"></input>
            <label for="check-out">Check-out</label>
            <input type="date" class="check-out" name="check-out"></input>
            </div>
            <label for="guest-number">Antall gjester</label>
            <input type="number" class="guest-number" name="guest-number"></input>
            <label for="inqueries">Forespørsel</label>
            <input type="text" class="inqueries" name="inqueries"></input>
            <button>Send forespørsel</button>
          </div>
        </form> 
      </section>
<div class="reviews">
   <div class="card">Anmeldelse 1</div>
   <div class="card">Anmeldelse 2</div>
   <div class="card" id="seeAllReviews">Se alle anmeldelser</div>

</div>
    </main>
    <script type="module" src="roomDetails.ts"></script>
  </body>
</html>
